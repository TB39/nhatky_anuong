<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Food Diary • Loopy & Cưng 💕</title>
    <style>
        :root {
            --primary: #ff8da1;
            --primary-dark: #ff4d6d;
            --accent: #ffb3c8;
            --bg: #fff0f5;
            --card: #ffffff;
            --text: #4a2c35;
            --subtext: #8c5f6b;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
       
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4ec 100%);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .floating-petals {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            color: #ff8da1;
            font-size: 1.4rem;
            opacity: 0.7;
            animation: floatPetals linear infinite;
            text-shadow: 0 2px 8px rgba(255, 141, 161, 0.3);
        }

        @keyframes floatPetals {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        header {
            text-align: center;
            padding: 2.5rem 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 141, 161, 0.2);
            position: relative;
            z-index: 10;
        }

        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 1rem;
        }

        .loopy-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-image: url('https://i.pinimg.com/736x/8f/fa/b9/8ffab9888915bc8b1cc1de20a9a81da1.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3),
                        inset 0 0 0 6px rgba(255, 255, 255, 0.9);
            border: 4px solid white;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        header:hover .loopy-avatar {
            transform: scale(1.08) rotate(8deg);
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ff4d6d, #ff8da1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
            padding: 0 1.2rem 5rem;
            position: relative;
            z-index: 5;
        }

        .wheel-section {
            background: var(--card);
            border-radius: 32px;
            padding: 2.2rem 1.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255, 141, 161, 0.15),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .wheel-title {
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 1.8rem;
            color: var(--primary-dark);
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-bottom: 32px solid #ff4d6d;
            filter: drop-shadow(0 6px 12px rgba(255, 77, 109, 0.4));
            z-index: 20;
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 14px #fff,
                        0 0 0 18px var(--accent),
                        0 15px 35px rgba(255, 77, 109, 0.25);
            transition: transform 4.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .btn-spin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 78px;
            height: 78px;
            background: linear-gradient(145deg, #ff4d6d, #ff6b84);
            color: white;
            border-radius: 50%;
            border: 5px solid #fff;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4),
                        inset 0 -4px 8px rgba(255,255,255,0.3);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn-spin:active {
            transform: translate(-50%, -50%) scale(0.88);
        }

        .result-popup {
            margin-top: 2rem;
            min-height: 78px;
            padding: 1rem 1.5rem;
            background: linear-gradient(90deg, #fff0f5, #ffe4ec);
            border-radius: 20px;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary-dark);
            box-shadow: 0 10px 25px rgba(255, 141, 161, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 2.2rem 0 1.2rem;
            color: var(--text);
        }

        .food-list {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .food-card {
            background: var(--card);
            border-radius: 24px;
            padding: 1.4rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 1.2rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .food-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 45px rgba(255, 141, 161, 0.22);
        }

        .food-image {
            width: 78px;
            height: 78px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .btn-maps {
            background: linear-gradient(145deg, #ff8da1, #ff6b84);
            color: white;
            padding: 0.75rem 1.4rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="floating-petals" id="petalsContainer"></div>

    <header>
        <div class="avatar-container">
            <div class="loopy-avatar"></div>
        </div>
        <h1>Our Food Diary</h1>
        <p>Hôm nay mình đi ăn gì nào cưng? 💕</p>
    </header>

    <div class="container">
        <div class="wheel-section">
            <div class="wheel-title">🎠 Vòng Quay Tình Yêu • Hôm Nay Ăn Gì?</div>
            <div class="wheel-wrapper">
                <div class="wheel-pointer"></div>
                <canvas id="wheel" class="wheel-canvas" width="300" height="300"></canvas>
                <button class="btn-spin" id="spinBtn">QUAY<br>💖</button>
            </div>
            <div class="result-popup" id="resultDisplay">
                Nhấn QUAY để chọn món ngon cùng nhau ✨
            </div>
        </div>

        <div class="section-title">🌸 Quán Ruột Của Hai Đứa</div>
        <div class="food-list" id="foodList"></div>
    </div>

    <footer>
        <p>Made with tons of love &amp; petals • Loopy &amp; Cưng • 2026</p>
    </footer>

    <script>
        // Floating petals
        function createPetal() {
            const container = document.getElementById('petalsContainer');
            const petal = document.createElement('div');
            petal.classList.add('petal');
            const icons = ['🌸', '💗', '🍓', '🧁', '✨'];
            petal.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 8 + 9) + 's';
            petal.style.fontSize = (Math.random() * 18 + 14) + 'px';
            container.appendChild(petal);
            setTimeout(() => petal.remove(), 18000);
        }
        setInterval(createPetal, 280);

        const foods = [
            { id: 1, name: "Bò bít tết ngã tư Hoà Lân", tag: "Món Chính", address: "Thuận An, Bình Dương", map: "https://maps.app.goo.gl/eE2kK2cAmwsjqTC27?g_st=ic", emoji: "🥩", color: "#ff6b84" },
            { id: 2, name: "Bún bò 29", tag: "Món Chính", address: "Thủ Dầu Một, Bình Dương", map: "https://maps.app.goo.gl/h5UfM4ni9k7m6gDc8?g_st=ic", emoji: "🍜", color: "#ff9bb3" },
            { id: 3, name: "Bánh bèo chén Bàu Bàng", tag: "Ăn Vặt", address: "Bàu Bàng, Bình Dương", map: "https://maps.app.goo.gl/mPKxHxHjM694K7ej8?g_st=ic", emoji: "🥟", color: "#ff8da1" },
            { id: 4, name: "Bún Đậu nhà Sen", tag: "Món Chính", address: "Bến Cát, Bình Dương", map: "https://maps.app.goo.gl/miswUFfUV9rmcdXo7?g_st=ic", emoji: "🍲", color: "#ff6b84" },
            { id: 5, name: "Bánh cuốn nóng Kim Loan", tag: "Món Chính", address: "Thủ Dầu Một, Bình Dương", map: "https://maps.app.goo.gl/NwJ1cPwM7cEuo9qH6?g_st=ic", emoji: "🌯", color: "#ff9bb3" },
            { id: 6, name: "Gỏi đu đủ", tag: "Ăn Vặt", address: "Bình Dương", map: "https://maps.app.goo.gl/hzydCMjUoxPJ8RkS7?g_st=ic", emoji: "🥗", color: "#ffb3c8" },
            { id: 7, name: "Chân gà & Sứa", tag: "Ăn Vặt", address: "Chợ đêm / Ăn vặt", map: "https://maps.app.goo.gl/17HNcw1VBZyfGXxdA?g_st=ic", emoji: "🐔", color: "#ff8da1" },
            { id: 8, name: "Sữa tươi trân châu & Bánh flan", tag: "Tráng Miệng", address: "Ăn vặt bờ kè", map: "https://maps.app.goo.gl/P7YXqCYaS2qepxT7A?g_st=ic", emoji: "🧋", color: "#ff6b84" },
            { id: 9, name: "Trà đào cam nhãn Soo tea", tag: "Đồ Uống", address: "Thủ Dầu Một", map: "https://maps.app.goo.gl/UDZkBjiLx3EZo5Sf7?g_st=ic", emoji: "🍵", color: "#ff9bb3" },
            { id: 10, name: "Bánh Paparoti", tag: "Tráng Miệng", address: "Tiệm bánh", map: "https://maps.app.goo.gl/vzrdFgFv8Eh57mun7?g_st=ic", emoji: "🥐", color: "#ffb3c8" }
        ];

        // Render food list
        function renderFoodList() {
            const container = document.getElementById('foodList');
            container.innerHTML = '';
            foods.forEach(food => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <div class="food-image" style="background-image: url('https://picsum.photos/id/${100 + food.id}/300/300')"></div>
                    <div style="flex:1">
                        <span style="font-size:0.75rem;background:#ffe4ec;color:#ff4d6d;padding:4px 10px;border-radius:20px;">${food.tag}</span>
                        <div style="font-weight:700;font-size:1.2rem;margin:8px 0;">${food.emoji} ${food.name}</div>
                        <p style="color:#8c5f6b;font-size:0.9rem;">📍 ${food.address}</p>
                    </div>
                    <a href="${food.map}" target="_blank" class="btn-maps">Chỉ đường 💕</a>
                `;
                container.appendChild(card);
            });
        }

        // Wheel
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDisplay = document.getElementById("resultDisplay");

        const size = 300;
        const center = size / 2;
        const radius = center - 12;
        const totalSegments = foods.length;
        const anglePerSegment = (2 * Math.PI) / totalSegments;

        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, size, size);
            for (let i = 0; i < totalSegments; i++) {
                const startAngle = i * anglePerSegment;
                const endAngle = startAngle + anglePerSegment;

                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, startAngle, endAngle);
                ctx.fillStyle = foods[i].color;
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw emoji + name
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAngle + anglePerSegment / 2 + Math.PI / 2);
                ctx.font = "bold 28px sans-serif";
                ctx.textAlign = "center";
                ctx.fillStyle = "#fff";
                ctx.fillText(foods[i].emoji, 0, -radius * 0.38);
                
                ctx.font = "600 13px sans-serif";
                ctx.fillText(foods[i].name.length > 12 ? foods[i].name.substring(0,11)+".." : foods[i].name, 0, radius * 0.22);
                ctx.restore();
            }

            // Center circle
            ctx.beginPath();
            ctx.arc(center, center, 42, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.strokeStyle = "#ff4d6d";
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        drawWheel();
        renderFoodList();

        // === VÒNG QUAY NGẪU NHIÊN CHÍNH XÁC ===
        spinBtn.addEventListener("click", () => {
            if (isSpinning) return;
            isSpinning = true;

            resultDisplay.innerHTML = `<span style="font-size:1.1rem">Đang xoay... hai đứa cùng chờ nè 💕</span>`;

            const targetIndex = Math.floor(Math.random() * totalSegments); // Hoàn toàn ngẫu nhiên

            const extraSpins = 360 * 6; // Ít nhất 6 vòng
            const targetAngle = (targetIndex * (360 / totalSegments)) + (360 / totalSegments) / 2;
            const finalRotation = extraSpins + (270 - targetAngle); // 270° là vị trí con trỏ

            currentRotation += finalRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const winner = foods[targetIndex];

                resultDisplay.innerHTML = `
                    🎉 <strong>Hôm nay chốt:</strong><br>
                    <span style="font-size:1.6rem;color:#ff4d6d;">${winner.emoji} ${winner.name}</span>
                `;

                // Confetti
                for (let i = 0; i < 45; i++) {
                    setTimeout(() => {
                        const c = document.createElement('div');
                        c.style.position = 'fixed';
                        c.style.left = Math.random() * 100 + 'vw';
                        c.style.top = '-20px';
                        c.style.fontSize = '1.5rem';
                        c.style.zIndex = '100';
                        c.textContent = ['💖','🌸','✨','🍓'][Math.floor(Math.random()*4)];
                        document.body.appendChild(c);
                        setTimeout(() => c.remove(), 2000);
                    }, i * 12);
                }
            }, 4300);
        });

        // Space key support
        document.addEventListener('keydown', e => {
            if (e.key === ' ' && !isSpinning) {
                e.preventDefault();
                spinBtn.click();
            }
        });
    </script>
</body>
</html>
